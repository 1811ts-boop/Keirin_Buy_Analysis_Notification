name: Keirin Daily Hybrid Sniper

on:
  schedule:
    # 毎日 日本時間 06:00 (UTC 21:00) に実行
    - cron: '0 21 * * *'
  workflow_dispatch:
    # 手動での実行も可能にする設定

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy lightgbm joblib beautifulsoup4 google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2

      - name: Run Keirin Daily Batch
        env:
          # GitHubのリポジトリ設定（Settings > Secrets and variables > Actions）で登録が必要
          GCP_SA_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          # 必要なディレクトリがない場合に作成
          mkdir -p KeirinData
          # Pythonスクリプトの実行
          python keirin_daily_batch.py
