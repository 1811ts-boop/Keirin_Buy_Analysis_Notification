name: Keirin Daily Sniper Bot

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-daily-batch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas numpy tqdm joblib lightgbm scikit-learn google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Download Data from Google Drive
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python download_from_drive.py

      - name: Run daily script
        env:
          # Messaging API用の2つの鍵をPythonに渡す
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python 日次コード.py

      - name: Sync to Google Drive
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python sync_to_drive.py
