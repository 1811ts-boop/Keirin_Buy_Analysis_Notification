name: 🚀 競輪AI 日次スナイプバッチ

on:
  schedule:
    # ⏰ 実行時間の設定 (UTC時間で指定します。JSTの朝5時は、マイナス9時間して「UTCの20時」になります)
    - cron: '0 20 * * *'
  workflow_dispatch: # ボタンを押して手動で即時実行するための設定

jobs:
  run-daily-batch:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 リポジトリのチェックアウト
      uses: actions/checkout@v4

    - name: 🐍 Python環境のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # 安定版のPythonを指定

    - name: 📦 必要なライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas numpy tqdm joblib lightgbm scikit-learn

    - name: 🤖 日次コードの実行 (AIスナイプ & LINE通知)
      env:
        # Step1で設定したSecretsを環境変数として読み込む
        LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        python 日次コード.py

    - name: 💾 更新されたマスターデータをGitHubに自動コミット＆プッシュ
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add KeirinData/
        # もしデータに変更があればコミットしてプッシュする
        git diff --quiet && git diff --staged --quiet || git commit -m "📝 マスターデータ自動更新: $(date +'%Y-%m-%d')"
        git push
